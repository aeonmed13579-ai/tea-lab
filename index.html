<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea Lab — 探索世界茶文化</title>
<style>
/* ============================================================
   TEA LAB — CSS Design System
   Modern Chinese Tea Aesthetic
   ============================================================ */

:root {
  --ink-green:  #1a3c2a;
  --tea-gold:   #c4a35a;
  --warm-white: #faf7f2;
  --paper:      #f5f0e8;
  --vermillion: #b5343a;
  --ink-dark:   #2c2c2c;
  --text-muted: #8b8178;
  --border-subtle: #e5ddd2;
  --shadow-card: 0 2px 16px rgba(26,60,42,0.08);
  --shadow-hover: 0 8px 32px rgba(26,60,42,0.14), 0 0 0 1px var(--tea-gold);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --font-serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, "Times New Roman", serif;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: var(--font-sans);
  background: var(--warm-white);
  color: var(--ink-dark);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ---- Header ---- */
.header {
  background: linear-gradient(135deg, var(--ink-green) 0%, #0f2a1e 100%);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.logo {
  font-family: var(--font-serif);
  font-size: 1.6rem;
  color: var(--tea-gold);
  cursor: pointer;
  letter-spacing: 2px;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo::before {
  content: "🍃";
  font-size: 1.3rem;
}
.header-nav { display: flex; gap: 12px; }
.header-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(196,163,90,0.3);
  color: var(--tea-gold);
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.9rem;
  font-family: var(--font-sans);
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-btn:hover { background: rgba(196,163,90,0.15); border-color: var(--tea-gold); }
.header-btn.active { background: var(--tea-gold); color: var(--ink-green); border-color: var(--tea-gold); }

/* ---- Main Container ---- */
.main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 100px; }

/* ---- Search View ---- */
.search-hero { text-align: center; padding: 60px 20px 40px; }
.search-hero h1 {
  font-family: var(--font-serif);
  font-size: 2.2rem;
  color: var(--ink-green);
  margin-bottom: 8px;
  letter-spacing: 4px;
}
.search-hero .subtitle {
  color: var(--text-muted);
  font-size: 1rem;
  margin-bottom: 36px;
  letter-spacing: 2px;
}
.search-box {
  display: flex;
  max-width: 520px;
  margin: 0 auto;
  gap: 0;
  background: white;
  border-radius: 50px;
  border: 2px solid var(--border-subtle);
  overflow: hidden;
  transition: var(--transition);
}
.search-box:focus-within {
  border-color: var(--tea-gold);
  box-shadow: 0 0 0 4px rgba(196,163,90,0.12);
}
.search-input {
  flex: 1;
  border: none;
  padding: 16px 24px;
  font-size: 1.05rem;
  font-family: var(--font-sans);
  outline: none;
  background: transparent;
  color: var(--ink-dark);
}
.search-input::placeholder { color: var(--text-muted); }
.search-btn {
  background: var(--tea-gold);
  color: white;
  border: none;
  padding: 16px 32px;
  font-size: 1rem;
  font-family: var(--font-serif);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  letter-spacing: 2px;
  font-weight: 600;
}
.search-btn:hover { background: #b5943f; }
.search-btn:disabled { opacity: .5; cursor: not-allowed; }

/* Quick suggestions */
.quick-tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 28px; }
.quick-tag {
  background: white;
  border: 1px solid var(--border-subtle);
  padding: 8px 18px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 0.9rem;
  font-family: var(--font-sans);
  color: var(--ink-green);
  transition: var(--transition);
}
.quick-tag:hover { border-color: var(--tea-gold); color: var(--tea-gold); background: var(--paper); }

/* ---- Results Grid ---- */
.results-section { display: none; }
.results-section.visible { display: block; }
.results-header { text-align: center; margin-bottom: 32px; }
.results-header h2 {
  font-family: var(--font-serif);
  color: var(--ink-green);
  font-size: 1.5rem;
  letter-spacing: 2px;
}
.results-header .search-term { color: var(--tea-gold); }
.result-count { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }

.tea-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
}

/* ---- Tea Card ---- */
.tea-card {
  background: white;
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-card);
  transition: var(--transition);
  position: relative;
  opacity: 0;
  transform: translateY(20px);
}
.tea-card.visible {
  opacity: 1;
  transform: translateY(0);
}
.tea-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
}
.tea-card:hover .card-illustration::after {
  opacity: 0.15;
}

/* ---- Card Illustration (Real Photo + SVG Fallback) ---- */
.card-illustration {
  height: 200px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Base layer: SVG illustration (always present) */
.card-illustration svg {
  width: 100%;
  height: 100%;
  position: absolute;
  inset: 0;
  z-index: 1;
}
/* Photo layer: loads on top of SVG from Picsum (Fastly CDN, works in China) */
.card-illustration .card-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.card-illustration .card-img.loaded {
  opacity: 1;
}
/* When image loaded successfully, slightly dim the SVG underneath */
.card-illustration .card-img.loaded ~ svg {
  opacity: 0;
  transition: opacity 0.3s ease;
}
.tea-card:hover .card-illustration .card-img.loaded {
  transform: scale(1.05);
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
/* Image loading shimmer */
@keyframes imgShimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.card-illustration:not(.image-loaded)::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 3;
  background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.15) 50%, transparent 75%);
  background-size: 200% 100%;
  animation: imgShimmer 1.5s infinite;
  pointer-events: none;
}

/* Tea type color themes (watercolor gradient backgrounds) */
.tea-green  { background: linear-gradient(165deg, #eaf7ea 0%, #c8e6c9 28%, #a5d6a7 55%, #7cbf7e 82%, #e8f5e9 100%); }
.tea-black  { background: linear-gradient(165deg, #fdf2ef 0%, #f5d5cb 28%, #e8b49c 55%, #d4916e 82%, #fbe9e7 100%); }
.tea-oolong { background: linear-gradient(165deg, #f5f0eb 0%, #e0d5cb 28%, #c9b8a4 55%, #b09778 82%, #efe7de 100%); }
.tea-white  { background: linear-gradient(165deg, #fafafa 0%, #eef0ee 28%, #dde2dc 55%, #cad3c8 82%, #f5f6f4 100%); }
.tea-puer   { background: linear-gradient(165deg, #f3eeea 0%, #dcd0c4 28%, #bca894 55%, #8d6e58 82%, #ede3d9 100%); }
.tea-herbal { background: linear-gradient(165deg, #f5fae8 0%, #e2ecc8 28%, #cfdea8 55%, #b8ce85 82%, #f0f5e3 100%); }
.tea-generic{ background: linear-gradient(165deg, #faf7f2 0%, #f2ece0 28%, #e8dcc8 55%, #dbcdb2 82%, #f5f0e8 100%); }

/* Subtle watercolor texture dots overlay (CSS-only) */
.card-illustration::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 0;
  opacity: 0.12;
  background-image:
    radial-gradient(circle at 15% 25%, var(--tea-gold) 0.5px, transparent 0.5px),
    radial-gradient(circle at 35% 60%, var(--tea-gold) 0.8px, transparent 0.8px),
    radial-gradient(circle at 55% 15%, var(--tea-gold) 0.4px, transparent 0.4px),
    radial-gradient(circle at 70% 70%, var(--tea-gold) 0.6px, transparent 0.6px),
    radial-gradient(circle at 85% 35%, var(--tea-gold) 0.5px, transparent 0.5px),
    radial-gradient(circle at 25% 80%, var(--tea-gold) 0.7px, transparent 0.7px),
    radial-gradient(circle at 65% 45%, var(--tea-gold) 0.3px, transparent 0.3px),
    radial-gradient(circle at 90% 85%, var(--tea-gold) 0.6px, transparent 0.6px),
    radial-gradient(circle at 10% 50%, var(--tea-gold) 0.5px, transparent 0.5px),
    radial-gradient(circle at 45% 30%, var(--tea-gold) 0.9px, transparent 0.9px);
  background-size: 100% 100%;
  pointer-events: none;
}

/* Card Body */
.card-body { padding: 20px; }
.card-brand {
  font-family: var(--font-serif);
  font-size: 1.15rem;
  color: var(--ink-green);
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.card-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
.card-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.card-meta-item .label { color: var(--ink-green); font-weight: 600; }
.card-price {
  font-family: var(--font-serif);
  font-size: 1.4rem;
  color: var(--vermillion);
  font-weight: 700;
  margin-bottom: 4px;
}
.card-sales { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 14px; }
.card-desc {
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 16px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-actions { display: flex; gap: 10px; }
.card-action {
  flex: 1;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: white;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-sans);
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: var(--ink-dark);
}
.card-action:hover { border-color: var(--tea-gold); color: var(--tea-gold); }
.card-action.fav-btn.favorited {
  background: var(--vermillion);
  color: white;
  border-color: var(--vermillion);
}
.card-action.copy-btn.copied {
  background: var(--ink-green);
  color: white;
  border-color: var(--ink-green);
}

/* ---- Loading State ---- */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(250,247,242,0.85);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.loading-overlay.visible { display: flex; }
.teapot-spinner {
  width: 60px;
  height: 60px;
  border: 3px solid var(--border-subtle);
  border-top-color: var(--tea-gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: var(--font-serif);
  color: var(--ink-green);
  letter-spacing: 2px;
  font-size: 1rem;
}

/* Skeleton cards */
.skeleton-grid { display: none; }
.skeleton-grid.visible {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
}
.skeleton-card {
  background: white;
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--border-subtle);
}
.skeleton-img { height: 180px; background: linear-gradient(90deg, #f0ebe0 25%, #e8e0d0 50%, #f0ebe0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
.skeleton-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.skeleton-line { height: 14px; border-radius: 4px; background: linear-gradient(90deg, #f0ebe0 25%, #e8e0d0 50%, #f0ebe0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
.skeleton-line.short { width: 60%; }
.skeleton-line.medium { width: 80%; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* ---- Settings Modal ---- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: white;
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  max-width: 480px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h3 {
  font-family: var(--font-serif);
  color: var(--ink-green);
  font-size: 1.3rem;
  margin-bottom: 8px;
  letter-spacing: 2px;
}
.modal .modal-desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
.modal label { display: block; font-size: 0.85rem; color: var(--ink-green); font-weight: 600; margin-bottom: 6px; }
.modal input, .modal select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-family: var(--font-sans);
  margin-bottom: 16px;
  transition: var(--transition);
  background: var(--paper);
}
.modal input:focus, .modal select:focus {
  outline: none;
  border-color: var(--tea-gold);
  box-shadow: 0 0 0 3px rgba(196,163,90,0.1);
}
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
.modal-actions button {
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: var(--transition);
}
.btn-primary {
  background: var(--tea-gold);
  color: white;
  border: none;
}
.btn-primary:hover { background: #b5943f; }
.btn-secondary {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-muted);
}
.btn-secondary:hover { border-color: var(--tea-gold); color: var(--tea-gold); }

/* ---- Panel (Favorites & History Drawer) ---- */
.panel-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 250;
}
.panel-overlay.visible { display: block; }
.panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-height: 70vh;
  background: white;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  z-index: 251;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
  display: none;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.panel.visible { display: flex; transform: translateY(0); }
.panel-handle {
  width: 40px;
  height: 4px;
  background: var(--border-subtle);
  border-radius: 2px;
  margin: 14px auto 0;
}
.panel-tabs { display: flex; border-bottom: 1px solid var(--border-subtle); padding: 16px 24px 0; gap: 20px; }
.panel-tab {
  padding: 10px 4px;
  font-size: 1rem;
  font-family: var(--font-serif);
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-muted);
  letter-spacing: 1px;
  transition: var(--transition);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.panel-tab.active { color: var(--ink-green); border-bottom-color: var(--tea-gold); }
.panel-content { flex: 1; overflow-y: auto; padding: 16px 24px 32px; }
.panel-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.panel-empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
.panel-empty p { font-size: 0.9rem; margin-bottom: 6px; }

/* Panel mini cards */
.mini-card {
  display: flex;
  gap: 14px;
  padding: 14px;
  background: var(--paper);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  align-items: center;
  transition: var(--transition);
  border: 1px solid transparent;
}
.mini-card:hover { border-color: var(--tea-gold); background: white; }
.mini-card .mini-img {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
}
.mini-card .mini-info { flex: 1; min-width: 0; }
.mini-card .mini-name { font-weight: 600; color: var(--ink-green); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-card .mini-meta { font-size: 0.8rem; color: var(--text-muted); }
.mini-card .mini-price { color: var(--vermillion); font-weight: 700; font-size: 0.9rem; }
.mini-card .mini-actions { display: flex; gap: 8px; flex-shrink: 0; }
.mini-action {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border-subtle);
  background: white;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.mini-action:hover { border-color: var(--tea-gold); }
.mini-action.danger:hover { border-color: var(--vermillion); color: var(--vermillion); }

.panel-clear-btn {
  display: block;
  margin: 16px auto 0;
  padding: 8px 20px;
  background: none;
  border: 1px solid var(--vermillion);
  color: var(--vermillion);
  border-radius: 50px;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-sans);
  transition: var(--transition);
}
.panel-clear-btn:hover { background: var(--vermillion); color: white; }

/* ---- Toast ---- */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}
.toast {
  background: var(--ink-green);
  color: white;
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-family: var(--font-sans);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  max-width: 360px;
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.error { background: var(--vermillion); }
.toast.success { background: var(--ink-green); }
.toast.warning { background: #c4a35a; color: var(--ink-dark); }
@keyframes toastIn { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform: translateX(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform: translateX(40px); } }

/* ---- Error Banner ---- */
.error-banner {
  display: none;
  background: #fff5f5;
  border: 1px solid #feb2b2;
  color: #9b2c2c;
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  margin-bottom: 20px;
  font-size: 0.9rem;
  align-items: center;
  gap: 10px;
}
.error-banner.visible { display: flex; }
.error-banner .error-icon { font-size: 1.2rem; flex-shrink: 0; }
.error-banner .error-msg { flex: 1; }
.error-banner .error-action {
  padding: 6px 14px;
  background: var(--vermillion);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.85rem;
  white-space: nowrap;
  font-family: var(--font-sans);
}

/* ---- API Key Warning on Search ---- */
.api-key-warning {
  display: none;
  background: #fffdf5;
  border: 1px solid var(--tea-gold);
  color: #7a6510;
  padding: 16px 20px;
  border-radius: var(--radius-sm);
  margin-top: 20px;
  max-width: 520px;
  margin-left: auto;
  margin-right: auto;
  text-align: center;
  font-size: 0.9rem;
  line-height: 1.6;
}
.api-key-warning.visible { display: block; }
.api-key-warning button {
  margin-top: 8px;
  padding: 8px 20px;
  background: var(--tea-gold);
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 0.9rem;
}

/* ---- Responsive ---- */
@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .logo { font-size: 1.3rem; }
  .header-btn { padding: 6px 12px; font-size: 0.8rem; }
  .search-hero { padding: 40px 16px 24px; }

     TOAST CONTAINER

<div class="toast-container" id="toastContainer"></div>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->
<script>
"use strict";

/* ==============================================================
   PASSWORD GATE
   ============================================================== */

const SITE_PASSWORD = "tealab2026";

function unlock() {
  const input = document.getElementById("passwordInput").value.trim();
  if (input === SITE_PASSWORD) {
    document.getElementById("passwordGate").style.display = "none";
    // Remember for 30 days
    try { localStorage.setItem("tea_lab_unlocked", "true"); } catch(e) {}
  } else {
    document.getElementById("passwordError").style.display = "block";
    document.getElementById("passwordInput").value = "";
    document.getElementById("passwordInput").style.animation = "none";
    document.getElementById("passwordInput").offsetHeight;
    document.getElementById("passwordInput").style.animation = "shake 0.4s ease";
  }
}

// Auto-unlock if previously authenticated
(function() {
  try {
    if (localStorage.getItem("tea_lab_unlocked") === "true") {
      document.getElementById("passwordGate").style.display = "none";
    }
  } catch(e) {}
})();

/* ==============================================================
   CONFIGURATION
   ============================================================== */

const DEFAULT_CONFIG = {
  provider: "deepseek",
  endpoint: "https://api.deepseek.com/v1",
  model: "deepseek-chat",
  apiKey: "sk-826c7689ea3547eb9ff625b1a019b7a7"
};

const PROVIDER_PRESETS = {
  deepseek: {
    endpoint: "https://api.deepseek.com/v1",
    model: "deepseek-chat"
  },
  openai: {
    endpoint: "https://api.openai.com/v1",
    model: "gpt-4o-mini"
  },
  custom: {
    endpoint: "",
    model: ""
  }
};

/* ==============================================================
   STORAGE SERVICE
   ============================================================== */

const LS = {
  get(key) {
    try { return JSON.parse(localStorage.getItem(key)); }
    catch { return null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch(e) {
      if (e.name === "QuotaExceededError") {
        showToast("存储空间不足，请清理收藏或历史记录", "error");
      }
      return false;
    }
  },
  remove(key) { localStorage.removeItem(key); }
};

function loadConfig() {
  const saved = LS.get("tea_lab_config");
  return saved ? { ...DEFAULT_CONFIG, ...saved } : { ...DEFAULT_CONFIG };
}

function saveConfigToStorage(config) {
  LS.set("tea_lab_config", {
    provider: config.provider,
    endpoint: config.endpoint,
    model: config.model,
    apiKey: config.apiKey
  });
}

function loadFavorites() {
  return LS.get("tea_lab_favorites") || [];
}

function saveFavorites(favorites) {
  if (favorites.length > 100) {
    showToast("收藏已达上限（100条），请清理后再添加", "warning");
    favorites = favorites.slice(0, 100);
  }
  LS.set("tea_lab_favorites", favorites);
}

function loadHistory() {
  return LS.get("tea_lab_history") || [];
}

function saveHistory(history) {
  if (history.length > 50) {
    history = history.slice(-50);
  }
  LS.set("tea_lab_history", history);
}

/* ==============================================================
   APP STATE
   ============================================================== */

let config = loadConfig();
let currentResults = [];       // TeaProduct[] from last search
let lastSearchTerm = "";
let currentPanelTab = "favorites";

/* ==============================================================
   DOM REFS
   ============================================================== */

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const dom = {
  searchView:     $("#searchView"),
  searchInput:    $("#searchInput"),
  searchBtn:      $("#searchBtn"),
  apiKeyWarning:  $("#apiKeyWarning"),
  errorBanner:    $("#errorBanner"),
  errorMsg:       $("#errorMsg"),
  errorAction:    $("#errorAction"),
  skeletonGrid:   $("#skeletonGrid"),
  resultsView:    $("#resultsView"),
  resultTerm:     $("#resultTerm"),
  resultCount:    $("#resultCount"),
  teaGrid:        $("#teaGrid"),
  loadingOverlay: $("#loadingOverlay"),
  settingsModal:  $("#settingsModal"),
  toastContainer:$("#toastContainer"),
  panelOverlay:   $("#panelOverlay"),
  panel:          $("#panel"),
  panelContent:   $("#panelContent")
};

/* ==============================================================
   INITIALIZATION
   ============================================================== */

function init() {
  populateSettingsForm();
  updateApiKeyWarning();
  buildSkeletonGrid();
}

function updateApiKeyWarning() {
  if (!config.apiKey) {
    dom.apiKeyWarning.classList.add("visible");
  } else {
    dom.apiKeyWarning.classList.remove("visible");
  }
}

function buildSkeletonGrid() {
  let html = "";
  for (let i = 0; i < 10; i++) {
    html += `
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>`;
  }
  dom.skeletonGrid.innerHTML = html;
}

init();

/* ==============================================================
   NAVIGATION
   ============================================================== */

function goHome() {
  dom.searchView.style.display = "";
  dom.resultsView.classList.remove("visible");
  dom.errorBanner.classList.remove("visible");
  dom.searchInput.value = "";
  dom.searchInput.focus();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showResults() {
  dom.searchView.style.display = "none";
  dom.resultsView.classList.add("visible");
  dom.errorBanner.classList.remove("visible");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showLoading(show) {
  if (show) {
    dom.loadingOverlay.classList.add("visible");
    dom.skeletonGrid.classList.add("visible");
    dom.searchBtn.disabled = true;
  } else {
    dom.loadingOverlay.classList.remove("visible");
    dom.skeletonGrid.classList.remove("visible");
    dom.searchBtn.disabled = false;
  }
}

/* ==============================================================
   SEARCH
   ============================================================== */

async function startSearch() {
  const term = dom.searchInput.value.trim();
  if (!term) {
    dom.searchInput.style.animation = "none";
    dom.searchInput.offsetHeight; // reflow
    dom.searchInput.style.animation = "shake 0.4s ease";
    dom.searchInput.focus();
    showToast("请输入茶叶名称", "warning");
    return;
  }

  if (term.length > 50) {
    showToast("茶叶名称过长，请精简到50字以内", "warning");
    return;
  }

  config = loadConfig();

  if (!config.apiKey) {
    dom.apiKeyWarning.classList.add("visible");
    showToast("请先在设置中配置 API Key", "error");
    return;
  }

  dom.errorBanner.classList.remove("visible");
  showLoading(true);

  try {
    const products = await callAI(term);
    currentResults = products;
    lastSearchTerm = term;

    // Save to history
    const history = loadHistory();
    history.push({
      id: crypto.randomUUID(),
      term: term,
      searched_at: new Date().toISOString(),
      products: products
    });
    saveHistory(history);

    renderResults(term, products);
    showLoading(false);
    showResults();
    showToast(`成功找到 ${products.length} 款茶叶`, "success");
  } catch (err) {
    showLoading(false);
    handleSearchError(err);
  }
}

function quickSearch(term) {
  dom.searchInput.value = term;
  startSearch();
}

function retrySearch() {
  if (lastSearchTerm) {
    dom.searchInput.value = lastSearchTerm;
  }
  startSearch();
}

/* ==============================================================
   AI API SERVICE
   ============================================================== */

async function callAI(teaType) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 45000);

  const systemPrompt = `你是一位全球茶叶市场专家，精通世界各国茶叶品牌、产地、价格行情和销售数据。

请根据用户输入的茶叶类型，生成10个全球知名品牌的真实产品信息。

## 重要要求：
1. 品牌必须是真实存在的知名品牌，覆盖不同国家/地区
2. 价格必须符合真实市场行情（注明币种）
3. 年销量数据要合理可信
4. 产地信息准确
5. 产品名称具体（包含等级、系列等）
6. 描述简洁专业（50字以内）

## 输出格式（严格JSON）：
{
  "tea_type": "用户输入的茶叶类型",
  "products": [
    {
      "id": "唯一标识",
      "name": "产品全名（含等级/系列）",
      "brand": "品牌名",
      "origin": "产地（国家+地区）",
      "price": { "amount": 数字, "currency": "币种代码（CNY/USD/GBP/EUR/JPY等）" },
      "annual_sales": "年销量（如'500吨'或'200万盒'）",
      "description": "简短产品描述（30-50字）",
      "tea_category": "茶类（green/black/oolong/white/puer/herbal/generic）"
    }
  ],
  "disclaimer": "以上数据为AI基于市场知识生成，仅供参考"
}

只输出JSON，不要任何其他文字。`;

  const userPrompt = `请为"${teaType}"生成10个全球知名品牌的产品信息。确保覆盖至少5个不同国家或地区的品牌。`;

  let response;
  try {
    response = await fetch(`${config.endpoint}/chat/completions`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${config.apiKey}`
      },
      body: JSON.stringify({
        model: config.model,
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: userPrompt }
        ],
        response_format: { type: "json_object" },
        temperature: 0.7,
        max_tokens: 4096
      }),
      signal: controller.signal
    });
  } finally {
    clearTimeout(timeoutId);
  }

  if (!response.ok) {
    const status = response.status;
    if (status === 401) throw new SearchError("API Key 无效，请检查后重试", "auth");
    if (status === 429) throw new SearchError("API 调用频率过高，请稍后重试", "rate");
    if (status === 402) throw new SearchError("API 余额不足，请充值或更换 Key", "quota");
    if (status >= 500) throw new SearchError("API 服务器错误，请稍后重试", "server");
    throw new SearchError(`API 请求失败 (${status})，请检查网络后重试`, "unknown");
  }

  let data;
  try {
    data = await response.json();
  } catch {
    throw new SearchError("API 返回数据格式异常，请重试", "parse");
  }

  // Extract JSON from response
  let content = data.choices?.[0]?.message?.content;
  if (!content) throw new SearchError("API 返回数据为空，请重试", "empty");

  // Parse the structured JSON
  let parsed;
  try {
    // Try direct parse first
    parsed = typeof content === "string" ? JSON.parse(content) : content;
  } catch {
    // Try to extract JSON from markdown code blocks
    const jsonMatch = content.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (jsonMatch) {
      try {
        parsed = JSON.parse(jsonMatch[1].trim());
      } catch {
        throw new SearchError("AI 返回格式异常，请重试", "parse");
      }
    } else {
      throw new SearchError("AI 返回格式异常，请重试", "parse");
    }
  }

  if (!parsed.products || !Array.isArray(parsed.products)) {
    throw new SearchError("AI 返回数据结构异常，请重试", "parse");
  }

  // Normalize and validate products
  const products = parsed.products.slice(0, 10).map((p, i) => ({
    id: p.id || crypto.randomUUID(),
    name: p.name || "未知产品",
    brand: p.brand || "未知品牌",
    origin: p.origin || "未知产地",
    price: {
      amount: typeof p.price?.amount === "number" ? p.price.amount : 0,
      currency: p.price?.currency || "CNY"
    },
    annual_sales: p.annual_sales || "暂无数据",
    description: p.description || "暂无描述",
    tea_category: p.tea_category || "generic",
    search_term: teaType
  }));

  if (products.length === 0) {
    throw new SearchError("AI 未生成有效产品数据，请尝试其他搜索词", "empty");
  }

  return products;
}

class SearchError extends Error {
  constructor(message, type) {
    super(message);
    this.type = type; // "auth" | "rate" | "quota" | "server" | "parse" | "empty" | "network" | "unknown"
  }
}

function handleSearchError(err) {
  console.error("Search error:", err);

  if (err instanceof SearchError) {
    dom.errorMsg.textContent = err.message;
    dom.errorBanner.classList.add("visible");

    if (err.type === "auth" || err.type === "quota") {
      dom.errorAction.textContent = "打开设置";
      dom.errorAction.onclick = () => { dom.errorBanner.classList.remove("visible"); openSettings(); };
    } else {
      dom.errorAction.textContent = "重试";
      dom.errorAction.onclick = retrySearch;
    }
  } else if (err.name === "AbortError") {
    dom.errorMsg.textContent = "请求超时，请检查网络后重试";
    dom.errorBanner.classList.add("visible");
    dom.errorAction.textContent = "重试";
    dom.errorAction.onclick = retrySearch;
  } else if (err.message === "Failed to fetch" || err.name === "TypeError") {
    dom.errorMsg.textContent = "网络连接失败，请检查网络或 API 地址是否正确";
    dom.errorBanner.classList.add("visible");
    dom.errorAction.textContent = "重试";
    dom.errorAction.onclick = retrySearch;
  } else {
    dom.errorMsg.textContent = err.message || "未知错误，请刷新页面后重试";
    dom.errorBanner.classList.add("visible");
    dom.errorAction.textContent = "重试";
    dom.errorAction.onclick = retrySearch;
  }

  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ==============================================================
   RENDER RESULTS
   ============================================================== */

function renderResults(term, products) {
  dom.resultTerm.textContent = term;
  dom.resultCount.textContent = `AI 为你找到 ${products.length} 款相关产品 · 数据仅供参考`;
  dom.teaGrid.innerHTML = "";

  products.forEach((product, index) => {
    const card = createTeaCard(product, index);
    dom.teaGrid.appendChild(card);
  });
}

function createTeaCard(product, index) {
  const card = document.createElement("div");
  card.className = "tea-card";

  const catClass = `tea-${product.tea_category || "generic"}`;
  const teaSvg = getTeaSvg(product.tea_category || "generic", index);
  // Bing tea images — ts*.mm.bing.net CDN accessible from China
  const imgUrl = getTeaPhotoUrl(product.tea_category || "generic", index);

  card.innerHTML = `
    <div class="card-illustration ${catClass}">
      ${teaSvg}
      <img class="card-img"
           src="${imgUrl}"
           alt="${escapeHTML(product.name)}"
           loading="lazy"
           onload="this.classList.add('loaded');this.parentElement.classList.add('image-loaded')"
           onerror="this.remove()">
    </div>
    <div class="card-body">
      <div class="card-brand">${escapeHTML(product.name)}</div>
      <div class="card-meta">
        <span class="card-meta-item"><span class="label">品牌</span> ${escapeHTML(product.brand)}</span>
        <span class="card-meta-item"><span class="label">产地</span> ${escapeHTML(product.origin)}</span>
      </div>
      <div class="card-price">${formatPrice(product.price)}</div>
      <div class="card-sales">📦 年销量：${escapeHTML(product.annual_sales)}</div>
      <div class="card-desc">${escapeHTML(product.description)}</div>
      <div class="card-actions">
        <button class="card-action fav-btn" data-id="${product.id}" onclick="toggleFavorite('${product.id}')">
          ♡ 收藏
        </button>
        <button class="card-action copy-btn" data-id="${product.id}" onclick="copyProduct('${product.id}')">
          📋 复制
        </button>
      </div>
    </div>`;

  // Stagger animation
  setTimeout(() => {
    card.classList.add("visible");
  }, index * 80);

  // Update fav button state
  updateFavButtonState(product.id, card);

  return card;
}

      <defs><linearGradient id="g7" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8d7b5e" stop-opacity="0.1"/><stop offset="100%" stop-color="#6b5e48" stop-opacity="0.04"/></linearGradient></defs>
      <rect width="400" height="200" fill="url(#g7)"/>
      <ellipse cx="200" cy="100" rx="150" ry="90" fill="rgba(212,200,168,0.12)"/>
      <line x1="160" y1="165" x2="195" y2="45" stroke="#8d7b5e" stroke-width="1.4" opacity="0.28"/>
      <line x1="195" y1="45" x2="235" y2="95" stroke="#a09070" stroke-width="1" opacity="0.22"/>
      <line x1="195" y1="45" x2="170" y2="120" stroke="#9e8c6c" stroke-width="1" opacity="0.2"/>
      <ellipse cx="195" cy="43" rx="20" ry="9" fill="#c4b898" opacity="0.45" transform="rotate(-15 195 43)"/>
      <ellipse cx="230" cy="58" rx="17" ry="8" fill="#d4c8a8" opacity="0.4" transform="rotate(20 230 58)"/>
      <ellipse cx="165" cy="68" rx="15" ry="7" fill="#b8a880" opacity="0.35" transform="rotate(-25 165 68)"/>
      <circle cx="70" cy="50" r="45" fill="rgba(255,255,255,0.2)"/>
      <circle cx="330" cy="155" r="55" fill="rgba(255,255,255,0.13)"/>
    </svg>`
  };

  let svg = svgs[category] || svgs.generic;
  // Make gradient IDs unique per card to avoid browser conflicts
  svg = svg.replace(/id="g(\d)"/g, `id="g$1-${seed}"`);
  svg = svg.replace(/url\(#g(\d)\)/g, `url(#g$1-${seed})`);
  return svg;
}

function updateFavButtonState(productId, card) {
  const favorites = loadFavorites();
  const isFav = favorites.some(f => f.id === productId);
  const btn = (card || document).querySelector(`.fav-btn[data-id="${productId}"]`);
  if (btn) {
    if (isFav) {
      btn.classList.add("favorited");
      btn.innerHTML = "♥ 已收藏";
    } else {
      btn.classList.remove("favorited");
      btn.innerHTML = "♡ 收藏";
    }
  }
}

function getTeaEmoji(category) {
  const map = {
    green: "🍵", black: "🫖", oolong: "🍂",
    white: "🌱", puer: "🪵", herbal: "🌸", generic: "🍃"
  };
  return map[category] || "🍃";
}

function formatPrice(price) {
  if (!price || price.amount === 0) return "价格暂无";
  const symbols = {
    CNY: "¥", USD: "$", GBP: "£", EUR: "€",
    JPY: "¥", KRW: "₩", TWD: "NT$", HKD: "HK$"
  };
  const sym = symbols[price.currency] || price.currency + " ";
  return `${sym}${price.amount.toLocaleString()}`;
}

function escapeHTML(str) {
  if (!str) return "";
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

/* ==============================================================
   FAVORITES
   ============================================================== */

function toggleFavorite(productId) {
  const product = currentResults.find(p => p.id === productId);
  if (!product) {
    // Try to find in history
    const history = loadHistory();
    for (const record of history) {
      const found = record.products.find(p => p.id === productId);
      if (found) return doToggleFav(found);
    }
    showToast("产品数据未找到", "error");
    return;
  }
  doToggleFav(product);
}

function doToggleFav(product) {
  const favorites = loadFavorites();
  const idx = favorites.findIndex(f => f.id === product.id);

  if (idx >= 0) {
    favorites.splice(idx, 1);
    saveFavorites(favorites);
    showToast("已取消收藏", "warning");
  } else {
    if (favorites.length >= 100) {
      showToast("收藏已达上限（100条），请先清理", "error");
      return;
    }
    favorites.push({ ...product, favorited_at: new Date().toISOString() });
    saveFavorites(favorites);
    showToast("已加入收藏 ♥", "success");
  }

  // Update all fav buttons for this product
  $$(`.fav-btn[data-id="${product.id}"]`).forEach(btn => {
    const card = btn.closest(".tea-card");
    updateFavButtonState(product.id, card);
  });

  // Refresh panel if open
  if (dom.panel.classList.contains("visible")) {
    renderPanelContent(currentPanelTab);
  }
}

/* ==============================================================
   COPY
   ============================================================== */

async function copyProduct(productId) {
  const product = findProductAnywhere(productId);
  if (!product) {
    showToast("产品数据未找到", "error");
    return;
  }

  const text = [
    `茶叶：${product.name}`,
    `品牌：${product.brand}`,
    `产地：${product.origin}`,
    `价格：${formatPrice(product.price)}`,
    `年销量：${product.annual_sales}`,
    `简介：${product.description}`,
    `—— Tea Lab 探索世界茶文化`
  ].join("\n");

  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      // Fallback for HTTP or older browsers
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
    }

    // Visual feedback on copy button
    const btn = document.querySelector(`.copy-btn[data-id="${productId}"]`);
    if (btn) {
      btn.classList.add("copied");
      btn.innerHTML = "✓ 已复制";
      setTimeout(() => {
        btn.classList.remove("copied");
        btn.innerHTML = "📋 复制";
      }, 2000);
    }
    showToast("已复制到剪贴板", "success");
  } catch {
    showToast("复制失败，请手动选中文字复制（Ctrl+C）", "error");
  }
}

function findProductAnywhere(productId) {
  // Check current results
  let product = currentResults.find(p => p.id === productId);
  if (product) return product;

  // Check history
  const history = loadHistory();
  for (const record of history) {
    product = record.products.find(p => p.id === productId);
    if (product) return product;
  }

  // Check favorites
  const favorites = loadFavorites();
  return favorites.find(p => p.id === productId) || null;
}

/* ==============================================================
   SETTINGS
   ============================================================== */

function populateSettingsForm() {
  config = loadConfig();
  $("#apiProvider").value = config.provider || "deepseek";
  $("#apiEndpoint").value = config.endpoint || "";
  $("#apiModel").value = config.model || "";
  $("#apiKey").value = config.apiKey || "";
}

function onProviderChange() {
  const provider = $("#apiProvider").value;
  const preset = PROVIDER_PRESETS[provider];
  if (preset && provider !== "custom") {
    $("#apiEndpoint").value = preset.endpoint;
    $("#apiModel").value = preset.model;
  }
}

function openSettings() {
  populateSettingsForm();
  dom.settingsModal.classList.add("visible");
}

function closeSettings() {
  dom.settingsModal.classList.remove("visible");
}

function saveSettings() {
  const provider = $("#apiProvider").value;
  const endpoint = $("#apiEndpoint").value.trim();
  const model = $("#apiModel").value.trim();
  const apiKey = $("#apiKey").value.trim();

  if (!endpoint) {
    showToast("请填写 API 地址", "warning");
    return;
  }
  if (!model) {
    showToast("请填写模型名称", "warning");
    return;
  }
  if (!apiKey) {
    showToast("请填写 API Key", "warning");
    return;
  }

  config = { provider, endpoint, model, apiKey };
  saveConfigToStorage(config);
  closeSettings();
  updateApiKeyWarning();
  showToast("设置已保存 ✓", "success");
}

/* ==============================================================
   FAVORITES & HISTORY PANEL
   ============================================================== */

function openPanel(tab) {
  currentPanelTab = tab;
  dom.panelOverlay.classList.add("visible");
  dom.panel.classList.add("visible");

  // Update tab buttons
  $$(".panel-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === tab);
  });

  renderPanelContent(tab);
}

function closePanel() {
  dom.panelOverlay.classList.remove("visible");
  dom.panel.classList.remove("visible");
}

function switchPanelTab(tab) {
  currentPanelTab = tab;
  $$(".panel-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === tab);
  });
  renderPanelContent(tab);
}

function renderPanelContent(tab) {
  if (tab === "favorites") {
    renderFavorites();
  } else {
    renderHistory();
  }
}

function renderFavorites() {
  const favorites = loadFavorites();

  if (favorites.length === 0) {
    dom.panelContent.innerHTML = `
      <div class="panel-empty">
        <div class="empty-icon">🫖</div>
        <p>还没有收藏任何茶叶</p>
        <p style="color:var(--text-muted);font-size:0.85rem;">搜索茶叶后点击 ♡ 即可收藏</p>
      </div>`;
    return;
  }

  let html = "";
  favorites.reverse().forEach(product => {
    html += createMiniCard(product, "fav");
  });
  html += `<button class="panel-clear-btn" onclick="clearFavorites()">清空收藏夹</button>`;
  dom.panelContent.innerHTML = html;
}

function renderHistory() {
  const history = loadHistory();

  if (history.length === 0) {
    dom.panelContent.innerHTML = `
      <div class="panel-empty">
        <div class="empty-icon">📜</div>
        <p>还没有搜索记录</p>
        <p style="color:var(--text-muted);font-size:0.85rem;">搜索茶叶后，历史记录会出现在这里</p>
      </div>`;
    return;
  }

  let html = "";
  history.reverse().forEach(record => {
    const time = new Date(record.searched_at).toLocaleString("zh-CN", {
      month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
    });
    html += `<div style="padding:8px 0;font-size:0.85rem;color:var(--text-muted);margin-top:4px;">🔍 "${escapeHTML(record.term)}" — ${time}（${record.products.length} 款）</div>`;
    record.products.forEach(product => {
      html += createMiniCard(product, "history");
    });
  });
  html += `<button class="panel-clear-btn" onclick="clearHistory()">清空历史记录</button>`;
  dom.panelContent.innerHTML = html;
}

function createMiniCard(product, context) {
  const catClass = `tea-${product.tea_category || "generic"}`;
  const teaEmoji = getTeaEmoji(product.tea_category);
  const favBtnDisabled = context === "fav" ? "disabled" : "";

  return `
    <div class="mini-card">
      <div class="mini-img ${catClass}">${teaEmoji}</div>
      <div class="mini-info">
        <div class="mini-name">${escapeHTML(product.name)}</div>
        <div class="mini-meta">${escapeHTML(product.brand)} · ${escapeHTML(product.origin)}</div>
        <div class="mini-price">${formatPrice(product.price)}</div>
      </div>
      <div class="mini-actions">
        <button class="mini-action" onclick="event.stopPropagation();copyProduct('${product.id}')" title="复制">📋</button>
        ${context === "fav"
          ? `<button class="mini-action danger" onclick="event.stopPropagation();toggleFavorite('${product.id}')" title="取消收藏">✕</button>`
          : `<button class="mini-action" onclick="event.stopPropagation();toggleFavorite('${product.id}')" title="收藏">♡</button>`
        }
      </div>
    </div>`;
}

function clearFavorites() {
  if (confirm("确定要清空所有收藏吗？此操作不可恢复。")) {
    LS.set("tea_lab_favorites", []);
    renderFavorites();
    // Refresh result cards
    $$(".fav-btn").forEach(btn => {
      const card = btn.closest(".tea-card");
      updateFavButtonState(btn.dataset.id, card);
    });
    showToast("收藏夹已清空", "warning");
  }
}

function clearHistory() {
  if (confirm("确定要清空所有历史记录吗？此操作不可恢复。")) {
    LS.set("tea_lab_history", []);
    renderHistory();
    showToast("历史记录已清空", "warning");
  }
}

/* ==============================================================
   TOAST
   ============================================================== */

function showToast(message, type) {
  type = type || "";
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  const icons = { success: "✓", error: "✕", warning: "⚠" };
  toast.innerHTML = `<span>${icons[type] || "ℹ"}</span> ${message}`;
  dom.toastContainer.appendChild(toast);

  setTimeout(() => {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
  }, 3200);
}

/* ==============================================================
   KEYBOARD SHORTCUTS
   ============================================================== */

document.addEventListener("keydown", (e) => {
  // Escape to close modals/panels
  if (e.key === "Escape") {
    if (dom.panel.classList.contains("visible")) closePanel();
    if (dom.settingsModal.classList.contains("visible")) closeSettings();
  }
  // Ctrl+K / Cmd+K to focus search
  if ((e.ctrlKey || e.metaKey) && e.key === "k") {
    e.preventDefault();
    goHome();
    dom.searchInput.focus();
  }
});
